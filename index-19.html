<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080e14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: 'DM Sans', sans-serif;
      padding: 0;
    }

    /* ─── App Shell ─── */
    #app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ─── Gradient BG ─── */
    #bg-gradient {
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 430px;
      height: 100vh;
      background: linear-gradient(180deg, #1a3a5c 0%, #0f2235 40%, #080e14 100%);
      z-index: 0;
      transition: background 1s ease;
      pointer-events: none;
    }

    /* ─── Top Bar ─── */
    .top-bar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      padding: 56px 20px 12px;
      gap: 10px;
    }
    .search-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 0 14px;
      gap: 8px;
    }
    .search-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 11px 0;
    }
    .search-wrap input::placeholder { color: rgba(255,255,255,0.35); }
    .search-ico { font-size: 14px; opacity: 0.5; }
    .search-btn {
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .search-btn:hover { background: rgba(255,255,255,0.2); }

    /* ─── Unit Toggle ─── */
    .unit-row {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: flex-end;
      padding: 0 20px 8px;
      gap: 4px;
    }
    .unit-pill {
      padding: 4px 12px;
      border-radius: 20px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .unit-pill.active { background: rgba(255,255,255,0.15); color: #fff; }

    /* ─── Tab Bar ─── */
    .tab-bar {
      position: relative;
      z-index: 10;
      display: flex;
      padding: 0 20px 16px;
      gap: 6px;
    }
    .tab-btn {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.4);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active { background: rgba(255,255,255,0.18); color: #fff; }

    /* ─── Views ─── */
    .view { display: none; position: relative; z-index: 5; }
    .view.active { display: block; }

    /* ─── State (loading/error/empty) ─── */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      gap: 12px;
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 15px;
    }
    .state-box .si { font-size: 44px; margin-bottom: 6px; opacity: 0.4; }
    .dots { display: flex; gap: 6px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.4);
      animation: bop 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bop { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-9px)} }

    /* ─── Hero ─── */
    .hero {
      padding: 12px 24px 0;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity .5s ease, transform .5s ease;
    }
    .hero.in { opacity: 1; transform: translateY(0); }

    .hero-location { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
    .hero-city { font-size: 28px; font-weight: 500; letter-spacing: -.4px; color: #fff; }
    .hero-country {
      background: rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.65);
    }
    .hero-date { font-size: 13px; color: rgba(255,255,255,0.4); font-family: 'DM Mono', monospace; margin-bottom: 20px; }

    .hero-main { display: flex; align-items: flex-start; justify-content: space-between; }
    .hero-left {}
    .hero-temp-row { display: flex; align-items: flex-start; }
    .hero-temp { font-size: 96px; font-weight: 300; line-height: 1; letter-spacing: -6px; color: #fff; }
    .hero-tunit { font-size: 40px; font-weight: 300; margin-top: 14px; color: rgba(255,255,255,0.5); }
    .hero-feels { font-size: 14px; color: rgba(255,255,255,0.45); margin-top: 6px; }

    .hero-right { text-align: center; padding-top: 8px; }
    .hero-icon { font-size: 64px; line-height: 1; }
    .hero-cond { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 6px; text-transform: capitalize; max-width: 90px; }

    /* ─── Save button ─── */
    .save-row { padding: 16px 24px 0; }
    .save-btn {
      width: 100%;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 11px;
      color: rgba(255,255,255,0.75);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .save-btn:hover { background: rgba(255,255,255,0.15); }
    .save-btn.saved { color: #7dd3fc; border-color: rgba(125,211,252,.35); background: rgba(125,211,252,.08); }

    /* ─── Section Cards ─── */
    .section-card {
      margin: 14px 20px 0;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
    }
    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: .8px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    /* ─── Hourly Scroll ─── */
    .hourly-scroll {
      display: flex;
      overflow-x: auto;
      gap: 0;
      padding: 14px 10px;
      scrollbar-width: none;
    }
    .hourly-scroll::-webkit-scrollbar { display: none; }

    .hour-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 14px;
      min-width: 58px;
      flex-shrink: 0;
      transition: background .15s;
      cursor: default;
    }
    .hour-item.now { background: rgba(255,255,255,0.13); }
    .hour-time { font-size: 12px; color: rgba(255,255,255,0.5); font-family: 'DM Mono', monospace; }
    .hour-item.now .hour-time { color: #fff; font-weight: 500; }
    .hour-icon { font-size: 22px; }
    .hour-temp { font-size: 15px; font-weight: 500; color: #fff; }
    .hour-precip { font-size: 11px; color: #7dd3fc; }

    /* ─── Stats Grid ─── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: rgba(255,255,255,0.07);
    }
    .stat-tile {
      background: rgba(255,255,255,0.06);
      padding: 16px;
    }
    .stat-tile:nth-child(odd):last-child { grid-column: span 2; }
    .stl { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
    .stv { font-size: 24px; font-weight: 300; color: #fff; font-family: 'DM Mono', monospace; }
    .stu { font-size: 12px; color: rgba(255,255,255,0.4); }

    /* ─── 7-day Forecast ─── */
    .forecast-list { padding: 4px 0; }
    .fc-row {
      display: flex;
      align-items: center;
      padding: 11px 16px;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .fc-row:last-child { border-bottom: none; }
    .fc-day-name { font-size: 15px; color: #fff; width: 44px; flex-shrink: 0; }
    .fc-ico { font-size: 22px; flex-shrink: 0; }
    .fc-cond { font-size: 12px; color: rgba(255,255,255,0.45); flex: 1; }
    .fc-range { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .fc-lo { font-size: 14px; color: rgba(255,255,255,0.4); font-family: 'DM Mono', monospace; }
    .fc-bar-wrap { width: 60px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.12); overflow: hidden; }
    .fc-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #7dd3fc, #fbbf24); }
    .fc-hi { font-size: 14px; color: #fff; font-family: 'DM Mono', monospace; }

    /* ─── Saved Locations ─── */
    .saved-view { padding: 16px 20px; }
    .saved-header { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 12px; }

    .loc-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 24px; gap: 10px; text-align: center;
      color: rgba(255,255,255,0.35); font-size: 14px;
    }
    .loc-empty .lei { font-size: 36px; opacity: .35; margin-bottom: 6px; }

    .loc-list { display: flex; flex-direction: column; gap: 10px; }
    .loc-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 16px 18px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
      transition: background .18s;
    }
    .loc-card:hover { background: rgba(255,255,255,0.13); }
    .loc-icon { font-size: 28px; flex-shrink: 0; }
    .loc-info { flex: 1; min-width: 0; }
    .loc-name { font-size: 16px; font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .loc-sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .loc-temp-big { font-size: 30px; font-weight: 300; color: #fff; font-family: 'DM Mono', monospace; flex-shrink: 0; }
    .loc-del {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; font-size: 13px; color: rgba(255,255,255,0.45);
      transition: all .15s;
    }
    .loc-del:hover { background: rgba(239,68,68,.25); border-color: rgba(239,68,68,.4); color: #fca5a5; }

    /* bottom padding */
    .bottom-space { height: 40px; }

    @media (max-width: 430px) {
      #bg-gradient { width: 100%; }
    }
  </style>
</head>
<body>

<div id="bg-gradient"></div>

<div id="app">
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input type="text" id="city-input" placeholder="Search city..." />
    </div>
    <button class="search-btn" onclick="fetchWeather()">Go</button>
  </div>

  <!-- Unit Toggle -->
  <div class="unit-row">
    <button class="unit-pill active" id="btn-f" onclick="setUnit('fahrenheit')">°F</button>
    <button class="unit-pill" id="btn-c" onclick="setUnit('celsius')">°C</button>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-wx" onclick="switchTab('wx')">🌤 Weather</button>
    <button class="tab-btn" id="tab-saved" onclick="switchTab('saved')">📍 Saved <span id="saved-badge"></span></button>
  </div>

  <!-- ── Weather View ── -->
  <div class="view active" id="view-wx">

    <div id="state-box" class="state-box">
      <div class="si">🌤</div>
      <div>Search a city to get started</div>
    </div>

    <div id="wx-content" style="display:none;opacity:0;transition:opacity .5s ease;">

      <!-- Hero -->
      <div class="hero" id="hero">
        <div class="hero-location">
          <div class="hero-city" id="h-city"></div>
          <div class="hero-country" id="h-country"></div>
        </div>
        <div class="hero-date" id="h-date"></div>
        <div class="hero-main">
          <div class="hero-left">
            <div class="hero-temp-row">
              <div class="hero-temp" id="h-temp"></div>
              <div class="hero-tunit" id="h-unit">°F</div>
            </div>
            <div class="hero-feels" id="h-feels"></div>
          </div>
          <div class="hero-right">
            <div class="hero-icon" id="h-icon"></div>
            <div class="hero-cond" id="h-cond"></div>
          </div>
        </div>
      </div>

      <!-- Save Button -->
      <div class="save-row">
        <button class="save-btn" id="save-btn" onclick="toggleSave()">
          <span id="save-icon">＋</span>
          <span id="save-label">Save Location</span>
        </button>
      </div>

      <!-- Hourly Forecast -->
      <div class="section-card">
        <div class="section-label">Hourly Forecast</div>
        <div class="hourly-scroll" id="hourly-scroll"></div>
      </div>

      <!-- Stats -->
      <div class="section-card">
        <div class="section-label">Conditions</div>
        <div class="stats-grid">
          <div class="stat-tile">
            <div class="stl">Humidity</div>
            <div class="stv" id="s-humidity">—</div>
            <div class="stu">%</div>
          </div>
          <div class="stat-tile">
            <div class="stl">Wind</div>
            <div class="stv" id="s-wind">—</div>
            <div class="stu" id="s-wind-unit">mph</div>
          </div>
          <div class="stat-tile">
            <div class="stl">UV Index</div>
            <div class="stv" id="s-uv">—</div>
            <div class="stu">uvi</div>
          </div>
          <div class="stat-tile">
            <div class="stl">Precipitation</div>
            <div class="stv" id="s-precip">—</div>
            <div class="stu">mm</div>
          </div>
        </div>
      </div>

      <!-- 7-Day Forecast -->
      <div class="section-card">
        <div class="section-label">7-Day Forecast</div>
        <div class="forecast-list" id="forecast-list"></div>
      </div>

      <div class="bottom-space"></div>
    </div>

  </div>

  <!-- ── Saved View ── -->
  <div class="view" id="view-saved">
    <div class="saved-view">
      <div class="saved-header">Saved Locations</div>
      <div id="loc-list"></div>
    </div>
  </div>

</div>

<script>
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let unit = 'fahrenheit';
  let coords = null;
  let saved = JSON.parse(localStorage.getItem('wx_saved') || '[]');

  const wmo = c => {
    if (c===0)   return {icon:'☀️',label:'Clear'};
    if (c<=2)    return {icon:'⛅',label:'Partly cloudy'};
    if (c===3)   return {icon:'☁️',label:'Overcast'};
    if (c<=49)   return {icon:'🌫️',label:'Foggy'};
    if (c<=59)   return {icon:'🌦️',label:'Drizzle'};
    if (c<=69)   return {icon:'🌧️',label:'Rain'};
    if (c<=79)   return {icon:'❄️',label:'Snow'};
    if (c<=82)   return {icon:'🌧️',label:'Showers'};
    if (c<=86)   return {icon:'❄️',label:'Snow showers'};
    if (c<=99)   return {icon:'⛈️',label:'Thunderstorm'};
    return {icon:'🌡️',label:'Unknown'};
  };

  const bgForCode = c => {
    if (c===0)  return 'linear-gradient(180deg,#1a6fa8 0%,#0e3d6e 40%,#080e14 100%)';
    if (c<=2)   return 'linear-gradient(180deg,#2d5f8a 0%,#183650 40%,#080e14 100%)';
    if (c===3)  return 'linear-gradient(180deg,#2a3a4a 0%,#151e28 40%,#080e14 100%)';
    if (c<=49)  return 'linear-gradient(180deg,#2a3440 0%,#141a22 40%,#080e14 100%)';
    if (c<=69)  return 'linear-gradient(180deg,#1e3448 0%,#0f1c2a 40%,#080e14 100%)';
    if (c<=79)  return 'linear-gradient(180deg,#2e3d50 0%,#17222e 40%,#080e14 100%)';
    if (c<=99)  return 'linear-gradient(180deg,#1a2a3a 0%,#0d1520 40%,#080e14 100%)';
    return 'linear-gradient(180deg,#1a3a5c 0%,#0f2235 40%,#080e14 100%)';
  };

  // ── Tab switch ──
  function switchTab(tab) {
    ['wx','saved'].forEach(t => {
      document.getElementById(`tab-${t}`).classList.toggle('active', t===tab);
      document.getElementById(`view-${t}`).classList.toggle('active', t===tab);
    });
    if (tab==='saved') renderSaved();
  }

  // ── Unit toggle ──
  function setUnit(u) {
    unit = u;
    document.getElementById('btn-f').classList.toggle('active', u==='fahrenheit');
    document.getElementById('btn-c').classList.toggle('active', u==='celsius');
    if (coords) loadWeather(coords.lat, coords.lon, coords.name, coords.country);
  }

  // ── State display ──
  function showState(html) {
    document.getElementById('state-box').innerHTML = html;
    document.getElementById('state-box').style.display = 'flex';
    const wc = document.getElementById('wx-content');
    wc.style.opacity = '0';
    wc.style.display = 'none';
  }

  function loading(msg) {
    showState(`<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div>${msg}</div>`);
  }

  // ── Geocode + fetch ──
  async function fetchWeather() {
    const city = document.getElementById('city-input').value.trim();
    if (!city) return;
    loading('Finding city...');
    try {
      const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
      const d = await r.json();
      if (!d.results?.length) { showState('<div class="si">⚠️</div><div>City not found</div>'); return; }
      const p = d.results[0];
      coords = { lat: p.latitude, lon: p.longitude, name: p.name, country: p.country_code };
      await loadWeather(p.latitude, p.longitude, p.name, p.country_code);
    } catch {
      showState('<div class="si">⚠️</div><div>Network error</div>');
    }
  }

  // ── Load weather ──
  async function loadWeather(lat, lon, name, country) {
    loading('Fetching weather...');
    const wu = unit==='fahrenheit' ? 'mph' : 'kmh';
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,weather_code,wind_speed_10m,uv_index` +
      `&hourly=temperature_2m,weather_code,precipitation_probability` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min` +
      `&temperature_unit=${unit}&wind_speed_unit=${wu}&timezone=auto&forecast_days=7`;
    try {
      const r = await fetch(url);
      if (!r.ok) throw new Error();
      const d = await r.json();
      render(d, name, country);
    } catch {
      showState('<div class="si">⚠️</div><div>Could not load weather</div>');
    }
  }

  // ── Render ──
  function render(d, name, country) {
    const ul = unit==='fahrenheit' ? '°F' : '°C';
    const wl = unit==='fahrenheit' ? 'mph' : 'km/h';
    const cur = d.current;
    const wx = wmo(cur.weather_code);

    // BG
    document.getElementById('bg-gradient').style.background = bgForCode(cur.weather_code);

    // Hero
    document.getElementById('h-city').textContent = name;
    document.getElementById('h-country').textContent = country.toUpperCase();
    const now = new Date();
    document.getElementById('h-date').textContent =
      DAYS[now.getDay()] + ', ' +
      now.toLocaleDateString('en-US',{month:'long',day:'numeric'}) + ' · ' +
      now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('h-temp').textContent = Math.round(cur.temperature_2m);
    document.getElementById('h-unit').textContent = ul;
    document.getElementById('h-feels').textContent = `Feels like ${Math.round(cur.apparent_temperature)}${ul}`;
    document.getElementById('h-icon').textContent = wx.icon;
    document.getElementById('h-cond').textContent = wx.label;

    // Stats
    document.getElementById('s-humidity').textContent = cur.relative_humidity_2m;
    document.getElementById('s-wind').textContent = Math.round(cur.wind_speed_10m);
    document.getElementById('s-wind-unit').textContent = wl;
    document.getElementById('s-uv').textContent = cur.uv_index.toFixed(1);
    document.getElementById('s-precip').textContent = cur.precipitation.toFixed(1);

    // Hourly (next 24 hours from now)
    const nowHour = new Date();
    nowHour.setMinutes(0,0,0);
    const hourlyTimes = d.hourly.time;
    const hourlyTemps = d.hourly.temperature_2m;
    const hourlyCodes = d.hourly.weather_code;
    const hourlyPrecip = d.hourly.precipitation_probability;

    let startIdx = hourlyTimes.findIndex(t => new Date(t) >= nowHour);
    if (startIdx < 0) startIdx = 0;

    let hourlyHTML = '';
    for (let i = startIdx; i < Math.min(startIdx + 24, hourlyTimes.length); i++) {
      const t = new Date(hourlyTimes[i]);
      const isNow = i === startIdx;
      const hr = t.getHours();
      const timeLabel = isNow ? 'Now' : (hr === 0 ? '12am' : hr < 12 ? `${hr}am` : hr === 12 ? '12pm' : `${hr-12}pm`);
      const ico = wmo(hourlyCodes[i]).icon;
      const tmp = Math.round(hourlyTemps[i]);
      const prec = hourlyPrecip[i];
      hourlyHTML += `<div class="hour-item${isNow?' now':''}">
        <div class="hour-time">${timeLabel}</div>
        <div class="hour-icon">${ico}</div>
        <div class="hour-temp">${tmp}${ul}</div>
        ${prec > 10 ? `<div class="hour-precip">${prec}%</div>` : '<div class="hour-precip" style="visibility:hidden">0%</div>'}
      </div>`;
    }
    document.getElementById('hourly-scroll').innerHTML = hourlyHTML;

    // 7-day
    const daily = d.daily;
    const allTemps = [...daily.temperature_2m_max, ...daily.temperature_2m_min];
    const tMin = Math.min(...allTemps), tMax = Math.max(...allTemps);

    let fcHTML = '';
    daily.time.forEach((dateStr, i) => {
      const dt = new Date(dateStr + 'T12:00:00');
      const dayName = i === 0 ? 'Today' : DAYS_SHORT[dt.getDay()];
      const ico = wmo(daily.weather_code[i]).icon;
      const cond = wmo(daily.weather_code[i]).label;
      const hi = Math.round(daily.temperature_2m_max[i]);
      const lo = Math.round(daily.temperature_2m_min[i]);
      const barLeft = ((lo - tMin) / (tMax - tMin) * 100).toFixed(1);
      const barWidth = ((hi - lo) / (tMax - tMin) * 100).toFixed(1);
      fcHTML += `<div class="fc-row">
        <div class="fc-day-name">${dayName}</div>
        <div class="fc-ico">${ico}</div>
        <div class="fc-cond">${cond}</div>
        <div class="fc-range">
          <div class="fc-lo">${lo}${ul}</div>
          <div class="fc-bar-wrap"><div class="fc-bar" style="margin-left:${barLeft}%;width:${barWidth}%"></div></div>
          <div class="fc-hi">${hi}${ul}</div>
        </div>
      </div>`;
    });
    document.getElementById('forecast-list').innerHTML = fcHTML;

    updateSaveBtn();

    // Show
    document.getElementById('state-box').style.display = 'none';
    const wc = document.getElementById('wx-content');
    wc.style.display = 'block';
    requestAnimationFrame(() => { wc.style.opacity = '1'; });
  }

  // ── Save/unsave ──
  function isSaved() {
    return coords && saved.some(l => l.name===coords.name && l.country===coords.country);
  }
  function toggleSave() {
    if (!coords) return;
    if (isSaved()) {
      saved = saved.filter(l => !(l.name===coords.name && l.country===coords.country));
    } else {
      saved.push({...coords});
    }
    localStorage.setItem('wx_saved', JSON.stringify(saved));
    updateSaveBtn();
    updateBadge();
  }
  function updateSaveBtn() {
    const btn = document.getElementById('save-btn');
    const si = document.getElementById('save-icon');
    const sl = document.getElementById('save-label');
    if (isSaved()) {
      btn.classList.add('saved'); si.textContent='✓'; sl.textContent='Saved';
    } else {
      btn.classList.remove('saved'); si.textContent='＋'; sl.textContent='Save Location';
    }
  }
  function updateBadge() {
    document.getElementById('saved-badge').textContent = saved.length ? `(${saved.length})` : '';
  }

  // ── Saved list ──
  function renderSaved() {
    const el = document.getElementById('loc-list');
    if (!saved.length) {
      el.innerHTML = `<div class="loc-empty"><div class="lei">📍</div><div>No saved locations</div><div style="font-size:13px;margin-top:4px;opacity:.7">Search a city and tap Save Location</div></div>`;
      return;
    }
    el.innerHTML = `<div class="loc-list" id="loc-list-inner"></div>`;
    const list = document.getElementById('loc-list-inner');
    saved.forEach((loc, i) => {
      const card = document.createElement('div');
      card.className = 'loc-card';
      card.id = `lc-${i}`;
      card.innerHTML = `
        <div class="loc-icon" id="li-ico-${i}">🌐</div>
        <div class="loc-info">
          <div class="loc-name">${loc.name}</div>
          <div class="loc-sub" id="li-sub-${i}">${loc.country.toUpperCase()} · Loading...</div>
        </div>
        <div class="loc-temp-big" id="li-temp-${i}">—</div>
        <div class="loc-del" onclick="delSaved(event,${i})">✕</div>
      `;
      card.addEventListener('click', e => {
        if (e.target.classList.contains('loc-del')) return;
        coords = {...loc};
        document.getElementById('city-input').value = loc.name;
        switchTab('wx');
        loadWeather(loc.lat, loc.lon, loc.name, loc.country);
      });
      list.appendChild(card);
      fetchLocPreview(loc, i);
    });
  }

  async function fetchLocPreview(loc, i) {
    const wu = unit==='fahrenheit' ? 'mph' : 'kmh';
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,weather_code&temperature_unit=${unit}&wind_speed_unit=${wu}&timezone=auto`;
    try {
      const r = await fetch(url);
      const d = await r.json();
      const ul = unit==='fahrenheit' ? '°F' : '°C';
      const wx = wmo(d.current.weather_code);
      const ti = document.getElementById(`li-temp-${i}`);
      const si = document.getElementById(`li-sub-${i}`);
      const ii = document.getElementById(`li-ico-${i}`);
      if (ti) ti.textContent = `${Math.round(d.current.temperature_2m)}${ul}`;
      if (si) si.textContent = `${loc.country.toUpperCase()} · ${wx.label}`;
      if (ii) ii.textContent = wx.icon;
    } catch {}
  }

  function delSaved(e, i) {
    e.stopPropagation();
    saved.splice(i, 1);
    localStorage.setItem('wx_saved', JSON.stringify(saved));
    updateSaveBtn();
    updateBadge();
    renderSaved();
  }

  // ── Enter key ──
  document.getElementById('city-input').addEventListener('keydown', e => {
    if (e.key==='Enter') fetchWeather();
  });

  updateBadge();
</script>
</body>
</html>
